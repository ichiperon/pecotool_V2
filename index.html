<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tauri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PecoTool V2</title>
    <style>
      #splashscreen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1e293b;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        flex-direction: column;
        gap: 16px;
        transition: opacity 0.3s ease-out;
      }
      #splashscreen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splashscreen h1 {
        font-size: 24px;
        font-weight: 600;
        margin: 0;
      }
      #splash-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #475569;
        border-top-color: #60a5fa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="splashscreen">
      <h1>PecoTool V2</h1>
      <div id="splash-spinner"></div>
    </div>
    <script>if(location.hash)document.getElementById('splashscreen').style.display='none'</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
